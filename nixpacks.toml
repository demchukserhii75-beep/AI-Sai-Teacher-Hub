[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = ["npm install", "cd server && npm install", "cd client && npm install"]

[phases.build]
cmds = ["npm run build"]

[variables]
DATABASE_URL = "postgresql://placeholder"
JWT_SECRET = "build-placeholder"
ANTHROPIC_API_KEY = "sk-ant-placeholder"

[start]
cmd = "npm start"
